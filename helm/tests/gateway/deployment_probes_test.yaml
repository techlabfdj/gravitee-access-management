suite: "Deployment probes Tests"
templates:
  - "gateway/gateway-deployment.yaml"
  - "gateway/gateway-configmap.yaml"

tests:
  - it: "Get default startupProbe values"
    template: gateway/gateway-deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].startupProbe"
          content:
            failureThreshold: 29
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server,security-domain-sync
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1

  - it: "Get default startupProbe values with unauthenticated internal api"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        services:
          core:
            http:
              authentication:
                type: none
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].startupProbe"
          content:
            failureThreshold: 29
            httpGet:
              path: /_node/health?probes=http-server,security-domain-sync
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1

  - it: "Get default startupProbe values with secure internal api"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        services:
          core:
            http:
              secured: true
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].startupProbe"
          content:
            failureThreshold: 29
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server,security-domain-sync
              port: 18092
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1

  - it: "Overwrite default startupProbe values with initialDelaySeconds"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        startupProbe:
          initialDelaySeconds: 15
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].startupProbe"
          content:
            failureThreshold: 29
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server,security-domain-sync
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1

  - it: "Overwrite default startupProbe values with httpGet.path/port"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        startupProbe:
          httpGet:
            path: /another/endpoint
            port: 8082
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].startupProbe"
          content:
            failureThreshold: 29
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /another/endpoint
              port: 8082
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1


  - it: "Get default livenessProbe values"
    template: gateway/gateway-deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].livenessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 3

  - it: "Overwrite default livenessProbe values with initialDelaySeconds"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        livenessProbe:
          initialDelaySeconds: 40
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].livenessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 40
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 3

  - it: "Overwrite default livenessProbe values with httpGet.path/port"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        livenessProbe:
          httpGet:
            path: /another/endpoint
            port: 8082
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].livenessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /another/endpoint
              port: 8082
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 3


  - it: "Get default readinessProbe values"
    template: gateway/gateway-deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].readinessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 3

  - it: "Overwrite default readinessProbe values with initialDelaySeconds"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        readinessProbe:
          initialDelaySeconds: 40
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].readinessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=http-server
              port: 18092
              scheme: HTTP
            initialDelaySeconds: 40
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 3

  - it: "Overwrite default readinessProbe values with httpGet.path/port"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        readinessProbe:
          httpGet:
            path: /another/endpoint
            port: 8082
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].readinessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /another/endpoint
              port: 8082
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 3

  - it: "Backward compatibility with readinessProbe domainSync enable"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        readinessProbe:
          domainSync: true
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].readinessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=security-domain-sync
              port: 18092
            initialDelaySeconds: 5
            periodSeconds: 30

  - it: "Backward compatibility with readinessProbe domainSync enable overwriting initialDelaySeconds"
    template: gateway/gateway-deployment.yaml
    set:
      gateway:
        readinessProbe:
          domainSync: true
          initialDelaySeconds: 40
    asserts:
      - hasDocuments:
          count: 1
      - isSubset:
          path: "spec.template.spec.containers[0].readinessProbe"
          content:
            failureThreshold: 3
            httpGet:
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW5hZG1pbg==
              path: /_node/health?probes=security-domain-sync
              port: 18092
            initialDelaySeconds: 40
            periodSeconds: 30
